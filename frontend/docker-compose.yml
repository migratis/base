# Dedicated project name so this standalone app's frontend never collides with
# another Compose project on the same host (network and `docker compose down`
# stay scoped to "base-frontend"). It reaches the backend over the host port
# 8004, so no shared Docker network is needed.
name: base-frontend

services:
  base-ui:
    container_name: frontend-base
    build:
      context: .
    volumes:
      - '.:/frontend'
      - /frontend/node_modules
    ports:
      - 3002:3002
    environment:
      - NODE_ENV=development
      - PORT=3002
