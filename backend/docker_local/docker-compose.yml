  base-api:
    build:
      context: .
    entrypoint: /docker-entrypoint.sh
    volumes:
      - .:/backend
      - ../frontend:/frontend
    expose:
      - "8004"
    ports:
      - "8004:8004"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      static-network:
        ipv4_address: 172.21.0.4
    # depends_on:
